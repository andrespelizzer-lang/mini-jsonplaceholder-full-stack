version: "3.8"

services:
  mysql:
    image: mysql:8.0
    container_name: mini-jsonplaceholder-db
    restart: unless-stopped
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-mini_jsonplaceholder}
      MYSQL_USER: ${MYSQL_USER:-studente}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-password123}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./api/database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ./api/database/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql

  phpmyadmin:
    image: phpmyadmin:5
    container_name: mini-jsonplaceholder-phpmyadmin
    restart: unless-stopped
    ports:
      - "8081:80"
    environment:
      PMA_HOST: mysql
      PMA_USER: ${MYSQL_USER:-studente}
      PMA_PASSWORD: ${MYSQL_PASSWORD:-password123}
    depends_on:
      - mysql

volumes:
  mysql_data:
